<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz in Progress - CS Quiz Master</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-theme="light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa-solid fa-laptop-code"></i> CS Quiz Master
            </a>
            <div class="ms-auto d-flex align-items-center">
                <button id="themeToggle" class="theme-toggle me-3" aria-label="Toggle Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm" id="quitQuizBtn">Quit Quiz</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container flex-grow-1 py-5">
        <div class="quiz-container">
            
            <!-- Loading State -->
            <div id="quizLoading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <h4 class="mt-3">Preparing your quiz...</h4>
            </div>

            <!-- Quiz Interface -->
            <div id="quizInterface" class="d-none fade-in">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="badge bg-primary fs-6" id="subjectBadge">Subject</span>
                    <div class="timer" id="timerDisplay">00:30</div>
                </div>
                
                <div class="progress mb-4">
                    <div class="progress-bar" id="quizProgress" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                </div>

                <div class="card p-4 p-md-5 mb-4 border-0 shadow-sm">
                    <div class="d-flex justify-content-between mb-3 text-muted fw-bold">
                        <span>Question <span id="currentQIndex">1</span> of <span id="totalQs">10</span></span>
                    </div>
                    <h3 class="card-title mb-4 lh-base" id="questionText">Question text goes here?</h3>
                    
                    <div id="optionsContainer" class="d-flex flex-column gap-2">
                        <!-- Options injected here -->
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <button class="btn btn-outline-secondary px-4 d-none" id="prevBtn"><i class="fa-solid fa-arrow-left"></i> Previous</button>
                    <button class="btn btn-primary px-5 ms-auto" id="nextBtn" disabled>Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="resultScreen" class="d-none fade-in text-center">
                <div class="card p-5 border-0 shadow-sm">
                    <div class="mb-4">
                        <i class="fa-solid fa-medal fa-5x text-warning"></i>
                    </div>
                    <h2 class="mb-3">Quiz Completed!</h2>
                    <p class="fs-5 text-muted mb-4">Here is how you performed in <strong id="resultSubject">Subject</strong></p>
                    
                    <div class="display-1 fw-black text-primary mb-2" id="finalScore">0</div>
                    <p class="fs-4 fw-bold mb-4">out of <span id="finalTotal">0</span></p>
                    
                    <div class="progress mb-4 mx-auto" style="height: 15px; max-width: 300px;">
                        <div class="progress-bar bg-success" id="resultProgress" style="width: 0%;"></div>
                    </div>
                    
                    <div class="d-flex justify-content-center gap-3 mt-5">
                        <a href="/" class="btn btn-outline-primary btn-lg">Return to Dashboard</a>
                        <button class="btn btn-primary btn-lg" id="retryBtn">Try Again</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/quiz.js"></script>
</body>
</html>
