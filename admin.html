<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CS Quiz Master</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-theme="light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa-solid fa-laptop-code"></i> CS Quiz Master
            </a>
            <div class="ms-auto d-flex align-items-center">
                <button id="themeToggle" class="theme-toggle me-3" aria-label="Toggle Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="/" class="btn btn-outline-secondary btn-sm">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container flex-grow-1 py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Admin Dashboard</h2>
            <div>
                <button class="btn btn-outline-primary me-2" data-bs-toggle="modal" data-bs-target="#uploadModal">
                    <i class="fa-solid fa-upload"></i> Upload JSON
                </button>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addQuestionModal">
                    <i class="fa-solid fa-plus"></i> Add Question
                </button>
            </div>
        </div>

        <div class="card p-4">
            <h4 class="card-title mb-4">Question Bank</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th style="width: 5%">ID</th>
                            <th style="width: 15%">Subject</th>
                            <th style="width: 40%">Question</th>
                            <th style="width: 30%">Options</th>
                            <th style="width: 10%">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="questionsTableBody">
                        <!-- Questions injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Question Modal -->
    <div class="modal fade" id="addQuestionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Question</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addQuestionForm">
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <select class="form-select form-control" id="qSubject" required>
                                <option value="Data Structures">Data Structures</option>
                                <option value="Operating Systems">Operating Systems</option>
                                <option value="DBMS">DBMS</option>
                                <option value="Computer Networks">Computer Networks</option>
                                <option value="Programming">Programming</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Question Text</label>
                            <textarea class="form-control" id="qText" rows="2" required></textarea>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Option 1 (Index 0)</label>
                                <input type="text" class="form-control option-input" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Option 2 (Index 1)</label>
                                <input type="text" class="form-control option-input" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Option 3 (Index 2)</label>
                                <input type="text" class="form-control option-input" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Option 4 (Index 3)</label>
                                <input type="text" class="form-control option-input" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Correct Option Index (0-3)</label>
                            <input type="number" class="form-control" id="qCorrect" min="0" max="3" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Question</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload Questions via JSON</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small">Format: <code>[{"subject":"...","question_text":"...","options":["A","B","C","D"],"correct_option":0}]</code></p>
                    <form id="uploadForm">
                        <div class="mb-3">
                            <input type="file" class="form-control" id="jsonFile" accept=".json" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
